name: Release

# Tag-driven releases. Cut a release by bumping `version` in package.json, adding
# a matching `## [x.y.z] - YYYY-MM-DD` section to the top of CHANGELOG.md, then:
#
#   git tag v0.1.0 && git push origin v0.1.0
#
# This workflow re-runs the gate, extracts the top CHANGELOG section as the
# release notes, and publishes a GitHub Release for the tag.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Gate (lint, format & test)
        run: |
          npm run eslint
          npm run format:check
          npm test

      - name: Build source bundle for manual installation
        run: |
          # Raycast has no .vsix-style installer: a local extension is a source
          # folder it compiles on the user's machine. Ship a clean source archive
          # of the tagged commit (git archive omits untracked node_modules/dist).
          ZIP="clessira-raycast-${GITHUB_REF_NAME}.zip"
          git archive --format=zip --prefix="clessira-raycast/" -o "$ZIP" HEAD
          echo "ZIP=$ZIP" >> "$GITHUB_ENV"
          ls -la "$ZIP"

      - name: Assemble release notes
        run: |
          # Body of the top-most "## …" CHANGELOG section (heading stripped) plus a
          # static "how to install this build" footer that documents the zip asset.
          awk '/^## /{n++} n==1{print} n==2{exit}' CHANGELOG.md | sed '1d' > RELEASE_NOTES.md
          cat .github/RELEASE_FOOTER.md >> RELEASE_NOTES.md
          echo "----- release notes -----"
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" "${ZIP}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file RELEASE_NOTES.md \
            --verify-tag
